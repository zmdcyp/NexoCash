apply plugin: 'com.android.application'

android {
    namespace 'com.nexocash.demo'
    compileSdk 34

    defaultConfig {
        applicationId "com.nexocash.demo"
        minSdk 24
        targetSdk 34
        versionCode 3
        versionName "0.3"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.8.0'
}
